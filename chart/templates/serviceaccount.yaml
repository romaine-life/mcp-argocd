# SA used by both containers. kube-rbac-proxy uses this SA's token to call
# TokenReview on incoming bearer tokens (granted via the system:auth-delegator
# binding in templates/auth-delegator.yaml). The same SA is what the upstream
# Python process projects as `audience: https://auth.romaine.life` to exchange
# at auth.romaine.life for a role=service JWT — auth.romaine.life identifies
# this SA via its K8S_SERVICE_SA_ALLOWLIST entry (mcp-argocd/mcp-argocd) and
# mints sub=svc:mcp-argocd:mcp-argocd, which argocd-rbac-cm maps to
# role:mcp-argocd.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-argocd
  namespace: mcp-argocd
