# ============================================================================
# mcp-argocd values
# ============================================================================
# No KV creds. Outbound auth to ArgoCD: a projected SA token (audience
# https://auth.romaine.life) is exchanged at auth.romaine.life's
# /api/auth/exchange/k8s for a role=service JWT, which is presented directly to
# the ArgoCD API. argocd-server verifies it against the auth.romaine.life JWKS
# (oidc.config) and the `g, svc:mcp-argocd:mcp-argocd, role:mcp-argocd` RBAC
# entry in the argocd Helm release values in infra-bootstrap maps it.

image:
  repository: romainecr.azurecr.io/mcp-argocd
  # SHA-pinned. .github/workflows/build.yml rewrites this tag on every push to main
  # via a `[skip ci]` follow-up commit. Quoted so all-digit short-SHAs don't
  # become floats — see reference_yaml_tag_quoting.md.
  tag: "7e858d9"
  pullPolicy: IfNotPresent

# Loopback-only port the Python uvicorn server listens on.
upstreamPort: 8080

# auth.romaine.life exchange wiring. These are env vars baked into the
# deployment; bumping any of them is a chart-level change, not a code change.
authExchange:
  # ArgoCD API base URL the minted service token is presented to.
  argocdServerUrl: http://argocd-server.argocd
  # auth.romaine.life k8s SA-token exchange endpoint.
  exchangeUrl: https://auth.romaine.life/api/auth/exchange/k8s
  # Audience pinned on the projected SA token. Must equal auth.romaine.life's
  # K8S_SERVICE_AUDIENCE so its verifier accepts the token; a token scoped to
  # this audience can't be replayed against any other JWT-validating service.
  saTokenAudience: https://auth.romaine.life

proxy:
  image:
    repository: quay.io/brancz/kube-rbac-proxy
    tag: v0.18.2
    pullPolicy: IfNotPresent
  port: 8443

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

proxyResources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
